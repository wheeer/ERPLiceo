<div class="landscape-login" [class.user-is-typing]="isFocused">
    
    <!-- FONDO NEGRO Y AURORA -->
    <div class="sky-background">
        <div class="aurora-glow glow-1"></div>
        <div class="aurora-glow glow-2"></div>
        <div class="aurora-glow glow-3"></div>
    </div>
    
    <!-- MONTAÑAS -->
    <div class="mountain-range">
       <svg preserveAspectRatio="none" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">
          <!-- Montaña fondo -->
          <path d="M 0 300 L 0 150 L 120 70 L 280 190 L 480 90 L 680 220 L 850 110 L 1000 200 L 1000 300 Z" fill="#0a0a0c"/>
          <!-- Montaña frente -->
          <path d="M 0 300 L 0 220 L 220 120 L 400 260 L 600 140 L 820 280 L 1000 160 L 1000 300 Z" fill="#040405"/>
       </svg>
    </div>

    <!-- ISOTIPO MINIMALISTA (Esquina Inferior Izquierda) -->
    <div class="bottom-left-logo">
        <svg class="quill-logo" xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22h.01"/>
            <path d="M11.99 22H12"/>
            <path d="M18.84 5.36l-8.5 8.5-2.12.71.71-2.12 8.5-8.5a2.828 2.828 0 0 1 4 4z"/>
            <path d="M15 6l3 3"/>
            <path d="M10 18H4v-6a8 8 0 0 1 8-8h0a8 8 0 0 1 8 8v1"/>
            <path d="M4 22h16"/>
        </svg>
        <span class="logo-text">ERP EMTP</span>
    </div>

    <!-- TARJETA FLOTANTE CUADRADA (Derecha) -->
    <main class="floating-wrapper" *ngIf="!cargando">
        <div class="login-card-square" [class.focused]="isFocused">
            
            <div class="login-header">
                <h2>Acceso Centralizado</h2>
                <p>Ingrese sus credenciales corporativas</p>
            </div>

            <form class="login-form" (ngSubmit)="iniciarSesion($event)" [formGroup]="loginForm">
                
                <div class="form-group" [class.has-error]="loginForm.get('rut')?.invalid && loginForm.get('rut')?.touched">
                    <label for="rut">RUT de Usuario</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input 
                            type="text" 
                            id="rut" 
                            formControlName="rut"
                            placeholder="Ej: 12345678-9" 
                            (focus)="setFocus(true)" 
                            (blur)="setFocus(false)"
                            autocomplete="username">
                    </div>
                </div>

                <div class="form-group" [class.has-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input 
                            type="password" 
                            id="password" 
                            formControlName="password"
                            placeholder="Escriba su contraseña" 
                            (focus)="setFocus(true)" 
                            (blur)="setFocus(false)"
                            autocomplete="current-password">
                    </div>
                </div>

                <div *ngIf="error" class="error-msg" role="alert">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    {{ error }}
                </div>

                <button type="submit" class="btn-acceso" [disabled]="loginForm.invalid">
                    Ingresar al Sistema
                </button>
            </form>
        </div>
    </main>

    <!-- BLOCKING LOADER (Carga Segura) -->
    <div class="blocking-loader" *ngIf="cargando">
        <div class="loader-content">
            <div class="spinner"></div>
            <h2 class="loader-title">Procesando</h2>
            <p class="loader-message">{{ loadingMessage }}</p>
        </div>
    </div>

</div>
