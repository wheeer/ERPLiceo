<div class="contenedor-asistencia">
  <h2>📅 Asistencia del día: {{ fechaHoy }}</h2>

  <div *ngIf="mensajeError" class="alerta error">⚠️ {{ mensajeError }}</div>
  <div *ngIf="mensajeConfirmacion" class="alerta exito">✅ {{ mensajeConfirmacion }}</div>

  <table class="tabla-erp"> 
    <thead>
      <tr>
        <th>RUT</th>
        <th>Nombre Completo</th>
        <th>Estado de Asistencia</th>
        <th>Horas Extra (Opcional)</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let empleado of empleadosActivos">
        <td style="font-family: monospace; color: #94a3b8;">{{ empleado.rut }}</td>
        <td style="font-weight: bold; color: white;">{{ empleado.nombre_completo }}</td>
        <td>
          <select [(ngModel)]="empleado.estadoAsistencia" [disabled]="diaCerrado">
            <option value="" disabled selected>Seleccione estado...</option>
            <option *ngFor="let estado of estadosPosibles" [value]="estado">
              {{ estado === 'Presente' ? '✅' : estado === 'Ausente' ? '❌' : estado === 'Tardanza' ? '⏰' : estado === 'Licencia' ? '⚕️' : '⏱️' }} {{ estado }}
            </option>
          </select>
        </td>
        <td>
          <input 
            *ngIf="empleado.estadoAsistencia === 'Horas Extra'" 
            type="number" 
            min="1" max="2" 
            [(ngModel)]="empleado.horasExtra" 
            placeholder="Máx 2 hrs"
            [disabled]="diaCerrado"
          >
          <span *ngIf="empleado.estadoAsistencia !== 'Horas Extra'" style="color: #64748b; font-size: 0.8rem;">No aplica</span>
        </td>
      </tr>
    </tbody>
  </table>

  <button *ngIf="!diaCerrado" class="btn-guardar" (click)="guardarTodo()">
    💾 Guardar Asistencia de Hoy
  </button>
  
  <button *ngIf="diaCerrado" class="btn-guardar" style="background-color: #facc15;" (click)="reabrirDia()">
    🔓 Reabrir Día para Corregir Errores
  </button>
</div>
