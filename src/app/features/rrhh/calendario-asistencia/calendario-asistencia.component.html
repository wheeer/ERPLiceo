<div class="calendario-container">
  <h2>Calendario Visual de Asistencia</h2>

  <div class="controles">
    <select [(ngModel)]="empleadoSeleccionado" (change)="buscarAsistencia()">
      <option value="">-- Seleccionar Empleado --</option>
      <option *ngFor="let emp of empleados" [value]="emp.id">{{ emp.nombre }}</option>
    </select>

    <select [(ngModel)]="mesSeleccionado" (change)="buscarAsistencia()">
      <option *ngFor="let mes of meses" [value]="mes.valor">{{ mes.nombre }}</option>
    </select>

    <select [(ngModel)]="anioSeleccionado" (change)="buscarAsistencia()">
      <option *ngFor="let anio of anios" [value]="anio">{{ anio }}</option>
    </select>
  </div>

  <div *ngIf="mensajeError" class="alerta-error">
    ⚠️ {{ mensajeError }}
  </div>

  <div class="grid-dias-semana">
    <div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
  </div>

  <div class="grid-calendario">
    <div *ngFor="let dia of diasDelMes" 
         class="dia-celda" 
         [ngClass]="dia.esVacio ? 'celda-vacia' : dia.clase">
      {{ dia.esVacio ? '' : dia.dia }}
    </div>
  </div>

  <div class="resumen">
    <p><strong>Total Presentes:</strong> {{ resumen.presente }}</p>
    <p><strong>Total Ausentes:</strong> {{ resumen.ausente }}</p>
    <p><strong>Total Tardanzas:</strong> {{ resumen.tardanza }}</p>
    <p><strong>Total Licencias:</strong> {{ resumen.licencia }}</p>
  </div>
</div>
