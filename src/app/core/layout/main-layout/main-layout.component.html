<div class="app-layout"
  [class.sidebar-collapsed]="isSidebarCollapsed"
  [class.mobile-sidebar-open]="isMobileSidebarOpen">

    <!-- BARRA DE PROGRESO DE RUTA (Feedback Psicológico) -->
    <div class="top-loading-bar" id="route-progress-bar"></div>

    <!-- OVERLAY MOBILE: Cierra sidebar al hacer clic fuera -->
    <div class="sidebar-overlay" (click)="closeMobileSidebar()"></div>
  
    <!-- SIDEBAR (Navegación Lateral) -->
    <app-sidebar class="layout-sidebar" [isCollapsed]="isSidebarCollapsed" (closeSidebar)="closeMobileSidebar()"></app-sidebar>
  
    <!-- ÁREA PRINCIPAL -->
    <div class="layout-content-wrapper">
      
      <!-- HEADER OFICIAL -->
      <app-header class="layout-header" (toggleSidebarEvent)="toggleSidebar()"></app-header>
      
      <!-- ÁREA DE TRABAJO (Módulos) -->
      <main class="layout-router-area">
        <router-outlet></router-outlet>
      </main>
  
      <!-- FOOTER INSTITUCIONAL -->
      <app-footer class="layout-footer"></app-footer>
    </div>
    
    <!-- SISTEMA DE NOTIFICACIONES TOAST -->
    <app-toast></app-toast>
  
  </div>
