<header class="erp-header">

  <!-- IZQUIERDA: Hamburguesa + Nombre del Sistema -->
  <div class="header-left">
    <button class="btn-hamburger" id="btn-toggle-sidebar" (click)="toggleSidebarEvent.emit()" title="Expandir/Colapsar menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="system-name">
      <span class="system-name-main">ERP</span>
      <span class="system-name-sub">EMTP</span>
      <span class="page-title-separator">/</span>
      <span class="page-title">{{ pageTitle }}</span>
    </div>
  </div>

  <!-- DERECHA: Notificaciones + Tema + Usuario -->
  <div class="header-right">

    <!-- Toggle Tema Claro/Oscuro -->
    <button class="btn-icon" id="btn-toggle-theme" (click)="themeService.toggleTheme()" [title]="themeService.isDarkMode() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
      <!-- Icono Sol (Modo Claro activo) -->
      @if (!themeService.isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      }
      <!-- Icono Luna (Modo Oscuro activo) -->
      @if (themeService.isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      }
    </button>

    <!-- Notificaciones -->
    <div class="notif-wrapper">
      <button class="btn-icon" id="btn-notificaciones" (click)="toggleNotificaciones()" title="Notificaciones">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        @if (notificacionesSinLeer > 0) {
          <span class="badge">{{ notificacionesSinLeer }}</span>
        }
      </button>

      @if (mostrarNotificaciones) {
        <div class="dropdown-panel notif-panel" id="panel-notificaciones">
          <h4 class="dropdown-title">Notificaciones</h4>
          @for (n of notificaciones; track n.texto) {
            <div class="notif-item" [class.no-leida]="!n.leida">
              <span class="notif-dot"></span>
              <p>{{ n.texto }}</p>
            </div>
          }
        </div>
      }
    </div>

    <!-- Menú de Usuario -->
    <div class="user-wrapper">
      <button class="btn-usuario" id="btn-menu-usuario" (click)="toggleMenuUsuario()">
        <div class="avatar">{{ usuario.iniciales }}</div>
        <div class="user-info">
          <span class="user-nombre">{{ usuario.nombre }}</span>
          <span class="user-rol">{{ usuario.rol }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      @if (mostrarMenuUsuario) {
        <div class="dropdown-panel user-panel" id="panel-usuario">
          <div class="user-panel-header">
            <div class="avatar avatar-lg">{{ usuario.iniciales }}</div>
            <div>
              <p class="panel-nombre">{{ usuario.nombre }}</p>
              <p class="panel-rol">{{ usuario.rol }}</p>
            </div>
          </div>
          <hr class="panel-divider">
          <button class="panel-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Mi Perfil
          </button>
          <button class="panel-btn panel-btn-danger" id="btn-cerrar-sesion" (click)="cerrarSesion()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Cerrar Sesión
          </button>
        </div>
      }
    </div>

  </div>
</header>
