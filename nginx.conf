server {
    listen 80;
    server_name erpliceo.ddns.net 54.87.191.204 localhost;

    # Redirigir tráfico HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name erpliceo.ddns.net;

    ssl_certificate /etc/letsencrypt/live/erpliceo.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erpliceo.ddns.net/privkey.pem;

    # Frontend Angular
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el Backend Django
    location /api/ {
        proxy_pass http://backend_prod:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://backend_prod:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
